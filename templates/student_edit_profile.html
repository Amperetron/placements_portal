{% extends 'base.html' %}
{% block title %}Edit Profile{% endblock title %}
{% block navbar %}{% endblock navbar %}
{% block welcome %}{% endblock welcome %}
{% block body %}
<div class="container-fluid min-vh-80 d-flex justify-content-center align-items-center">
    <div class="card p-4 border-0" style="width: 400px;">
        <h1 class="text-center">Edit Profile</h1>
        <form action="{{url_for('edit_profile')}}" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="exampleInputName" class="form-label">Name</label>
                <input name="name" type="text" class="form-control" id="exampleInputName"
                    aria-describedby="emailHelp" value="{{current_user.name}}">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input name="passwd" type="password" class="form-control">
            </div>
            <div class="mb-3">
                <label for="exampleInputName" class="form-label">Phone</label>
                <input name="sphone" type="number" class="form-control" id="exampleInputName"
                    aria-describedby="emailHelp" value="{{student.sphone}}">
            </div>
            <div class="mb-3">
                <label for="exampleInputName" class="form-label">Department</label>
                <input name="sdept" type="text" class="form-control" id="exampleInputName"
                    aria-describedby="emailHelp" value="{{student.sdept}}">
            </div>
            <div class="mb-3">
                <label for="exampleInputName" class="form-label">CGPA</label>
                <input name="scgpa" type="number" class="form-control" id="exampleInputName"
                    aria-describedby="emailHelp" value="{{student.scgpa}}">
            </div>
            <div class="mb-3">
                <label for="exampleInputName" class="form-label">Upload Your Resume</label>
                <input name="resume" type="file" class="form-control" id="exampleInputName"
                    aria-describedby="emailHelp" >
            </div>
            <div class="text-center">
                <button type="submit" class="btn btn-success">Save</button>
            </div>
        </form>
    </div>
</div>
{%endblock body%}
