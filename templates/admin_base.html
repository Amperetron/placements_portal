<!doctype html>
<html>
<head>
  <title>{% block title %}{% endblock title %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
  {% block navbar %}
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" aria-current="page" href="{{ url_for('admin_dashboard') }}">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" aria-current="page" href="{{ url_for('admin_students') }}">Students</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('admin_company') }}">Companies</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('admin_application') }}">Applications</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('admin_drives') }}">Drives</a>
        </li>
      </ul>
        <i class="bi bi-person-fill fs-4 me-2"></i>
        <a class="navbar-brand" href="#">{{current_user.name}}</a>
        <a class="btn btn-danger btn-sm" href="{{ url_for('logout') }}">Logout</a>
    </div>
  </div>
</nav>
  {% endblock navbar %}
  {% block searchbar %}
  <div class="d-flex justify-content-center my-4">
  <form class="d-flex w-50 gap-2" method="GET" action="{{ request.path }}">
    <input class="form-control"
           type="search"
           name="search"
           placeholder="Search"
           value="{{ request.args.get('search', '') }}">
    <button class="btn btn-success  px-4" type="submit">
      Search
    </button>
  </form>
</div>
  {% endblock searchbar %}
  {% block body %}

  {% endblock body %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
