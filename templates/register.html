{% extends 'base.html' %}
{% block title %}Signup Page{% endblock title %}
{% block welcome %}
{% endblock welcome %}
{% block body %}
<div class="container-fluid min-vh-80 d-flex justify-content-center align-items-center">
    <div class="card p-4 border-0" style="width: 400px;">
        <h1 class="text-center">Register</h1>
        <form action="/register" method="post">

<div class="mb-3">
    <label class="form-label">Email</label>
    <input name="email" type="email" class="form-control">
</div>

<div class="mb-3">
    <label class="form-label">Name</label>
    <input name="name" type="text" class="form-control">
</div>

<div class="mb-3">
    <label class="form-label">Password</label>
    <input name="password" type="password" class="form-control">
</div>

<div class="mb-3">
<select name="role" class="form-select" required>
    <option value="" disabled selected>Choose a role</option>
    <option value="company">Recruiter</option>
    <option value="student">Student</option>
</select>
</div>

<div class="mb-3">
    <label class="form-label">Website (Recruiter only)</label>
    <input name="cwebsite" type="url" class="form-control">
</div>

<div class="mb-3">
    <label class="form-label">HR Contact (Recruiter only)</label>
    <input name="hrcontact" type="number" class="form-control">
</div>

<div class="text-center">
    <button type="submit" class="btn btn-primary">Signup</button>
</div>

</form>
    </div>
</div>
{% endblock body %}
